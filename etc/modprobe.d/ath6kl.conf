# Dell Venue 8 Pro 5830 - make the ath6kl AR6004 Wi-Fi firmware self-heal.
# recovery_enable=1 : reset and recover the chip if the firmware asserts/crashes.
# heart_beat_poll=2000 : poll firmware liveness every 2000 ms; recover if it hangs.
options ath6kl_core recovery_enable=1 heart_beat_poll=2000
